<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" role="img" aria-label="Schematische Darstellung der Redox-Neurobiochemie: eine Nervenzelle mit Mitochondrien und ein reversibles Thiol-Disulfid-Gleichgewicht, katalysiert durch die Oxidoreduktase Grx2.">
  <defs>
    <style>
      .lab { font-family: "IBM Plex Mono", ui-monospace, monospace; font-size: 15px; font-weight: 600; letter-spacing: .06em; fill: #656b70; }
      .lab-a { fill: #0b464b; }
      .lab-c { fill: #6e4a2d; }
      .chem { font-family: "IBM Plex Mono", ui-monospace, monospace; font-size: 18px; font-weight: 600; fill: #1b2023; }
    </style>
  </defs>

  <rect width="600" height="420" fill="#ffffff"/>
  <rect x="20" y="20" width="560" height="380" rx="8" fill="#f7faf9"/>

  <!-- Neuron -->
  <g stroke="#0f5a60" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M150 130 l-42 -34"/>
    <path d="M150 130 l-52 6"/>
    <path d="M150 130 l-30 44"/>
    <path d="M188 160 l150 66"/>
  </g>
  <circle cx="168" cy="146" r="40" fill="#e7f0f0" stroke="#0f5a60" stroke-width="3"/>
  <circle cx="168" cy="146" r="14" fill="none" stroke="#0f5a60" stroke-width="2.5" opacity="0.6"/>

  <!-- Mitochondrien -->
  <g>
    <rect x="118" y="240" width="96" height="42" rx="21" fill="#ffffff" stroke="#9a6a43" stroke-width="3"/>
    <path d="M128 261 l14 -12 l14 12 l14 -12 l14 12 l14 -12" fill="none" stroke="#9a6a43" stroke-width="2.5"/>
    <rect x="212" y="300" width="80" height="36" rx="18" fill="#ffffff" stroke="#9a6a43" stroke-width="3"/>
    <path d="M221 318 l12 -10 l12 10 l12 -10 l12 10" fill="none" stroke="#9a6a43" stroke-width="2.5"/>
  </g>
  <text x="166" y="312" text-anchor="middle" class="lab lab-c">MITOCHONDRIEN</text>

  <!-- Redox-Gleichgewicht -->
  <text x="392" y="150" class="chem">SH</text>
  <text x="392" y="180" class="chem">SH</text>
  <text x="520" y="166" class="chem">S&#8211;S</text>

  <!-- reversible Pfeile -->
  <path d="M440 152 q42 -20 74 -6" fill="none" stroke="#0b464b" stroke-width="2.5"/>
  <path d="M514 146 l-11 -3 l4 10" fill="none" stroke="#0b464b" stroke-width="2.5"/>
  <path d="M514 176 q-42 20 -74 6" fill="none" stroke="#0b464b" stroke-width="2.5"/>
  <path d="M440 182 l11 3 l-4 -10" fill="none" stroke="#0b464b" stroke-width="2.5"/>

  <text x="478" y="128" text-anchor="middle" class="lab lab-a">Grx2</text>
  <text x="392" y="228" class="lab">REDUZIERT</text>
  <text x="558" y="228" text-anchor="end" class="lab">OXIDIERT</text>
</svg>
