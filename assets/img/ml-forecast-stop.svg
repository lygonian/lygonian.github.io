<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Validierung und versiegelter Test des Cash-Forecast-Modells</title>
  <desc id="desc">In der Validierung ist die WAPE des Trendmodells mit 9,8 Prozent niedriger als die der Baseline mit 17,8 Prozent. Im versiegelten Test liegt das Trendmodell mit 33,2 Prozent deutlich hinter der Baseline mit 9,9 Prozent. Niedriger ist besser.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0d12"/>
      <stop offset="1" stop-color="#16272c"/>
    </linearGradient>
    <linearGradient id="petrol" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7cc4c9"/>
      <stop offset="1" stop-color="#0f5a60"/>
    </linearGradient>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M80 0H0V80" fill="none" stroke="#ffffff" stroke-opacity=".04"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>

  <g font-family="Inter, Arial, sans-serif">
    <text x="120" y="102" fill="#7cc4c9" font-size="27" font-weight="600" letter-spacing="5">8-WOCHEN-SUMMEN-WAPE · NIEDRIGER IST BESSER</text>
    <text x="120" y="172" fill="#ffffff" font-size="52" font-weight="650">Die Validierung war noch nicht der Test</text>
    <text x="120" y="218" fill="#ffffff" fill-opacity=".65" font-size="25">Gleicher Kandidat, zwei zeitlich getrennte Bewertungsbereiche</text>

    <g transform="translate(120 292)">
      <text x="0" y="0" fill="#ffffff" font-size="29" font-weight="650">Validierung</text>
      <text x="1190" y="0" fill="#7cc4c9" font-size="24" font-weight="650">KANDIDAT VORN</text>

      <text x="0" y="72" fill="#ffffff" fill-opacity=".84" font-size="23">Trendmodell</text>
      <rect x="270" y="43" width="870" height="42" rx="8" fill="#ffffff" fill-opacity=".07"/>
      <rect x="270" y="43" width="257" height="42" rx="8" fill="url(#petrol)"/>
      <text x="548" y="75" fill="#ffffff" font-size="27" font-weight="700">9,8 %</text>

      <text x="0" y="145" fill="#ffffff" fill-opacity=".84" font-size="23">Baseline</text>
      <rect x="270" y="116" width="870" height="42" rx="8" fill="#ffffff" fill-opacity=".07"/>
      <rect x="270" y="116" width="465" height="42" rx="8" fill="#ffffff" fill-opacity=".42"/>
      <text x="756" y="148" fill="#ffffff" font-size="27" font-weight="700">17,8 %</text>
    </g>

    <line x1="120" y1="496" x2="1480" y2="496" stroke="#ffffff" stroke-opacity=".18"/>

    <g transform="translate(120 558)">
      <text x="0" y="0" fill="#ffffff" font-size="29" font-weight="650">Versiegelter Test</text>
      <text x="1255" y="0" fill="#d6a77f" font-size="24" font-weight="700">STOP</text>

      <text x="0" y="72" fill="#ffffff" fill-opacity=".84" font-size="23">Trendmodell</text>
      <rect x="270" y="43" width="870" height="42" rx="8" fill="#ffffff" fill-opacity=".07"/>
      <rect x="270" y="43" width="870" height="42" rx="8" fill="#9a6a43"/>
      <text x="1162" y="75" fill="#ffffff" font-size="27" font-weight="700">33,2 %</text>

      <text x="0" y="145" fill="#ffffff" fill-opacity=".84" font-size="23">Baseline</text>
      <rect x="270" y="116" width="870" height="42" rx="8" fill="#ffffff" fill-opacity=".07"/>
      <rect x="270" y="116" width="259" height="42" rx="8" fill="url(#petrol)"/>
      <text x="550" y="148" fill="#ffffff" font-size="27" font-weight="700">9,9 %</text>
    </g>

    <text x="120" y="836" fill="#ffffff" fill-opacity=".66" font-size="24">Vorregistriert, einmal geöffnet, danach nicht auf denselben Daten nachjustiert.</text>
  </g>
</svg>
