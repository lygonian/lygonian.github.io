<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" role="img" aria-label="Schematische Darstellung der Neuroimmunologie: ein FACS-Dotplot mit zwei Zellpopulationen, eine qPCR-Amplifikationskurve mit Schwellenwert und ein Antikörper.">
  <defs>
    <style>
      .lab { font-family: "IBM Plex Mono", ui-monospace, monospace; font-size: 14px; font-weight: 600; letter-spacing: .05em; fill: #656b70; }
      .lab-a { fill: #0b464b; }
      .ax { stroke: #656b70; stroke-width: 2; }
    </style>
  </defs>

  <rect width="600" height="420" fill="#ffffff"/>
  <rect x="20" y="20" width="560" height="380" rx="8" fill="#f7faf9"/>

  <!-- FACS-Dotplot -->
  <line x1="70" y1="80" x2="70" y2="300" class="ax"/>
  <line x1="70" y1="300" x2="300" y2="300" class="ax"/>
  <text x="60" y="76" text-anchor="end" class="lab">FACS</text>
  <text x="185" y="330" text-anchor="middle" class="lab">RGS1</text>
  <!-- Population 1 (accent) -->
  <g fill="#0f5a60" opacity="0.8">
    <circle cx="112" cy="252" r="4"/><circle cx="126" cy="238" r="4"/><circle cx="104" cy="236" r="4"/>
    <circle cx="134" cy="256" r="4"/><circle cx="120" cy="264" r="4"/><circle cx="98" cy="250" r="4"/>
    <circle cx="140" cy="240" r="4"/><circle cx="116" cy="248" r="4"/><circle cx="130" cy="270" r="4"/>
  </g>
  <!-- Population 2 (copper) -->
  <g fill="#9a6a43" opacity="0.85">
    <circle cx="216" cy="150" r="4"/><circle cx="232" cy="136" r="4"/><circle cx="208" cy="134" r="4"/>
    <circle cx="244" cy="156" r="4"/><circle cx="224" cy="164" r="4"/><circle cx="200" cy="148" r="4"/>
    <circle cx="250" cy="140" r="4"/><circle cx="228" cy="148" r="4"/><circle cx="240" cy="172" r="4"/>
  </g>

  <!-- qPCR-Kurve -->
  <line x1="340" y1="90" x2="340" y2="210" class="ax"/>
  <line x1="340" y1="210" x2="540" y2="210" class="ax"/>
  <path d="M340 208 C 400 206, 430 200, 452 150 C 466 118, 478 104, 540 100" fill="none" stroke="#0f5a60" stroke-width="3"/>
  <line x1="340" y1="150" x2="540" y2="150" stroke="#9a6a43" stroke-width="1.5" stroke-dasharray="5 5"/>
  <circle cx="452" cy="150" r="5" fill="#9a6a43"/>
  <text x="540" y="238" text-anchor="end" class="lab">qPCR · ZYKLEN</text>
  <text x="548" y="146" class="lab" fill="#6e4a2d">Ct</text>

  <!-- Antikörper -->
  <g stroke="#0b464b" stroke-width="4" fill="none" stroke-linecap="round">
    <path d="M420 300 l-24 -34"/>
    <path d="M420 300 l24 -34"/>
    <path d="M420 300 l0 40"/>
  </g>
  <circle cx="396" cy="266" r="7" fill="#7cc4c9" stroke="#0b464b" stroke-width="3"/>
  <circle cx="444" cy="266" r="7" fill="#7cc4c9" stroke="#0b464b" stroke-width="3"/>
  <text x="420" y="368" text-anchor="middle" class="lab lab-a">ANTIKÖRPER</text>
</svg>
